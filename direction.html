<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Apart Hotel Berck — Direction</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0A;
    --surface: #141414;
    --surface2: #1C1C1C;
    --border: #333;
    --text: #F0EDE8;
    --muted: #666;
    --muted2: #888;
    --accent: #C8F060;
    --today-color: #fff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--bg);
  }
  .header-left {}
  .header-eyebrow {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted2);
    font-family: 'Syne', sans-serif;
  }
  .header-name {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-top: 2px;
  }
  .header-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn {
    width: 32px;
    height: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--surface2); }
  .nav-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: capitalize;
    min-width: 110px;
    text-align: center;
    white-space: nowrap;
  }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }
  .tab {
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: #fff;
  }

  /* ENCADRÉ MÉNAGES À VENIR */
  .menages-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .menage-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    min-width: 200px;
    flex-shrink: 0;
  }
  .menage-day-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .menage-day-title.today { color: var(--accent); }
  .menage-day-title.tomorrow { color: #FF6B35; }
  .menage-day-title.after { color: #4FC3F7; }
  .menage-item {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .menage-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .menage-nom {
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .menage-empty {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }

  /* PLANNING GANTT */
  .planning-outer {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .planning-inner {
    min-width: max-content;
    padding-bottom: 40px;
  }
  .grid-header {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .col-name {
    width: 160px;
    min-width: 160px;
    flex-shrink: 0;
    padding: 10px 14px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted2);
    border-right: 1px solid var(--border);
    position: sticky;
    left: 0;
    background: var(--bg);
    z-index: 60;
  }
  .day-headers { display: flex; }
  .day-header {
    width: 38px;
    min-width: 38px;
    text-align: center;
    padding: 6px 0;
    font-size: 10px;
    color: #ccc;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  .day-header.is-today { color: #fff; }
  .day-header.is-weekend { background: #2A2A2A; color: #888; }
  .day-header .dow { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
  .day-header .dnum { font-size: 11px; font-weight: 600; font-family: 'Syne', sans-serif; }
  .day-header.is-today .dnum {
    background: #fff;
    color: #000;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  /* GROUPES PRESTATAIRES */
  .group-header {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .group-label {
    width: 160px;
    min-width: 160px;
    flex-shrink: 0;
    padding: 6px 14px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted2);
    border-right: 1px solid var(--border);
    position: sticky;
    left: 0;
    background: var(--surface);
    z-index: 10;
  }
  .group-spacer {
    flex: 1;
    background: var(--surface);
  }

  /* LIGNES */
  .row {
    display: flex;
    border-bottom: 1px solid var(--border);
    min-height: 48px;
  }
  .row:hover { background: #111; }
  .row-name {
    width: 160px;
    min-width: 160px;
    flex-shrink: 0;
    padding: 0 14px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    position: sticky;
    left: 0;
    background: var(--bg);
    z-index: 10;
    gap: 7px;
  }
  .row:hover .row-name { background: #111; }
  .color-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .row-name-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 120px;
    font-size: 11px;
  }
  .row-cells {
    display: flex;
    position: relative;
    flex: 1;
  }
  .day-cell {
    width: 38px;
    min-width: 38px;
    height: 48px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .day-cell.is-today { background: rgba(255,255,255,0.03); }
  .day-cell.is-weekend { background: #1A1A1A; }

  /* BARRES */
  .res-bar {
    position: absolute;
    top: 5px;
    height: 34px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: default;
    letter-spacing: 0.3px;
    border-radius: 0;
    outline: 1.5px solid #0A0A0A;
    clip-path: polygon(14px 0%, 100% 0%, calc(100% - 14px) 100%, 0% 100%);
    z-index: 5;
  }
  .res-bar.nl { clip-path: polygon(0% 0%, 100% 0%, calc(100% - 14px) 100%, 0% 100%); }
  .res-bar.nr { clip-path: polygon(14px 0%, 100% 0%, 100% 100%, 0% 100%); }
  .res-bar.nl.nr { clip-path: none; border-radius: 2px; }

  /* LOADER */
  .loader-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 20px;
    gap: 16px;
  }
  .loader {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 13px; color: var(--muted2); }
</style>
</head>
<body>

<div id="app">
  <div class="loader-wrap">
    <div class="loader"></div>
    <div class="loader-text">Chargement de tous les logements…</div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztItAM6kCCLdR6EB0N_CdqOg-71JUYThcqMCVNgThC6e5XRUgX-GGrS0krMN4Cfw/exec';

const GROUPES = {
  christelle: { label: 'Christelle', color: '#4FC3F7' },
  clara:      { label: 'Clara',      color: '#FF6B35' },
  remi:       { label: 'Rémi',       color: '#AAAAAA' },
  compiegne:  { label: 'Compiègne',  color: '#A78BFA' }
};

// Couleurs par logement (10 couleurs par groupe)
const LOGEMENT_COLORS = {
  // Christelle (9) - bleus
  '150m plage Coeur de Berck': '#4FC3F7',
  'Balneo Face mer':           '#0288D1',
  'Hamac Face Mer':            '#00BCD4',
  'La Rotonde':                '#26C6DA',
  'Coeur des sables':          '#0097A7',
  'Romantique chic patio':     '#00ACC1',
  'Romantique Face Mer':       '#006064',
  'Face Mer Esplanade':        '#29B6F6',
  'Terrasse 100m plage':       '#039BE5',
  // Clara (6) - oranges
  'Hamac chic vue mer':        '#FF6B35',
  'Rez de chaussee Parking':   '#FF8C00',
  'SPA Brasero':               '#FFA726',
  'Vue mer panoramique':       '#FF7043',
  'Balneo 100m Plage Jardin':  '#E64A19',
  'Suite Romantique':          '#FFAB40',
  // Remi (5) - gris
  'Hamac vue mer':             '#BDBDBD',
  'Kitesurf':                  '#9E9E9E',
  'Paddle':                    '#EEEEEE',
  'Surf':                      '#757575',
  '3 Chambres':                '#CACACA',
  // Compiègne (1) - violet
  'Compiègne':                 '#A78BFA'
};

const MOIS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DOW_FR  = ['D','L','M','M','J','V','S'];

let allData   = {}; // { remi: [...events], christelle: [...], clara: [...] }
let colorMap  = {}; // logement -> couleur
let viewYear, viewMonth;
let activeTab = 'planning';

let calAnnexe = []; // événements calendrier DRAP/CHECK IN-OUT

async function fetchCalAnnexe() {
  try {
    const url = APPS_SCRIPT_URL + '?action=ical&url=' + encodeURIComponent('https://calendar.google.com/calendar/ical/8e2aa92cb418bfa01e1a133d5835ef14be76315442ba4703e67431393ffca07b%40group.calendar.google.com/public/basic.ics');
    const res = await fetch(url);
    const data = await res.json();
    calAnnexe = data.events || [];
  } catch(e) {
    calAnnexe = [];
  }
}

async function init() {
  const now = new Date();
  viewYear  = now.getFullYear();
  viewMonth = now.getMonth();

  try {
    // Charge les 3 prestataires + calendrier annexe en parallèle
    const [dataChristelle, dataClara, dataRemi, dataCompiegne] = await Promise.all([
      fetchPresta('christelle'),
      fetchPresta('clara'),
      fetchPresta('remi'),
      fetchCompiegne()
    ]);

    allData = {
      christelle: dataChristelle,
      clara: dataClara,
      remi: dataRemi,
      compiegne: dataCompiegne
    };

    // Couleurs depuis dictionnaire
    [...dataChristelle, ...dataClara, ...dataRemi, ...dataCompiegne].forEach(e => {
      if (!colorMap[e.logement]) colorMap[e.logement] = LOGEMENT_COLORS[e.logement] || '#888';
    });

    await fetchCalAnnexe();
    renderApp();

    setTimeout(() => {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      if (yesterday.getMonth() === viewMonth && yesterday.getFullYear() === viewYear) {
        const outer = document.querySelector('.planning-outer');
        if (outer) outer.scrollLeft = Math.max(0, (yesterday.getDate() - 2) * 38 - 40);
      }
    }, 150);

  } catch(err) {
    showError('Impossible de charger les données.<br>' + err.message);
  }
}

async function fetchPresta(presta) {
  const res  = await fetch(`${APPS_SCRIPT_URL}?presta=${presta}`);
  const data = await res.json();
  return data.events || [];
}

async function fetchCompiegne() {
  try {
    const url = APPS_SCRIPT_URL + '?action=ical&url=' + encodeURIComponent('https://api.beds24.com/ical/bookings.ics?roomid=533389');
    const res = await fetch(url);
    const data = await res.json();
    return (data.events || []).map(e => ({ ...e, logement: 'Compiègne' }));
  } catch(e) { return []; }
}

function renderApp() {
  const allEvents = [...(allData.remi||[]), ...(allData.christelle||[]), ...(allData.clara||[]), ...(allData.compiegne||[])];
  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const after = new Date(today); after.setDate(today.getDate() + 2);

  // Ménages = checkouts
  // Jour de ménage = end - 1 jour (DTEND dans iCal = lendemain du vrai départ)
  const menagesToday    = allEvents.filter(e => { const d = new Date(e.end); d.setDate(d.getDate()-1); return fmt(d) === fmt(today); });
  const menagesTomorrow = allEvents.filter(e => { const d = new Date(e.end); d.setDate(d.getDate()-1); return fmt(d) === fmt(tomorrow); });
  const menagesAfter    = allEvents.filter(e => { const d = new Date(e.end); d.setDate(d.getDate()-1); return fmt(d) === fmt(after); });

  let html = `
    <div class="header">
      <div class="header-left">
        <div class="header-eyebrow">Apart Hotel Berck</div>
        <div class="header-name">Direction</div>
      </div>
      <div class="header-nav">
        <button class="nav-btn" onclick="prevMonth()">‹</button>
        <div class="nav-label" id="nav-label">${MOIS_FR[viewMonth]} ${viewYear}</div>
        <button class="nav-btn" onclick="nextMonth()">›</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab ${activeTab==='planning'?'active':''}" onclick="setTab('planning')">Planning</div>
      <div class="tab ${activeTab==='menages'?'active':''}" onclick="setTab('menages')">Ménages à venir</div>
    </div>`;

  if (activeTab === 'menages') {
    html += renderMenages(menagesToday, menagesTomorrow, menagesAfter, today, tomorrow, after);
  } else {
    // Encadré ménages en haut du planning aussi
    // Calcul surcharge (>4 ménages par prestataire par jour)
  const overloadToday = getOverload(allEvents, today);
  const overloadTomorrow = getOverload(allEvents, tomorrow);
  const overloadAfter = getOverload(allEvents, after);
  const day3 = new Date(today); day3.setDate(today.getDate()+3);
  const day4 = new Date(today); day4.setDate(today.getDate()+4);
  const menagesDay3 = allEvents.filter(e => { const d = new Date(e.end); d.setDate(d.getDate()-1); return fmt(d) === fmt(day3); });
  const menagesDay4 = allEvents.filter(e => { const d = new Date(e.end); d.setDate(d.getDate()-1); return fmt(d) === fmt(day4); });

  html += `<div class="menages-section">`;
  html += menageCard('Aujourd\'hui', menagesToday, 'today', today, overloadToday);
  html += menageCard('Demain', menagesTomorrow, 'tomorrow', tomorrow, overloadTomorrow);
  html += menageCard('Après-demain', menagesAfter, 'after', after, overloadAfter);
  html += menageCard(day3.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}), menagesDay3, 'after', day3, getOverload(allEvents, day3));
  html += menageCard(day4.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}), menagesDay4, 'after', day4, getOverload(allEvents, day4));
  html += `</div>`;
    html += renderPlanning();
  }

  document.getElementById('app').innerHTML = html;
}

function getOverload(events, date) {
  // Retourne les prestataires avec >4 ménages ce jour
  const overloaded = [];
  const prestaMap = { christelle: [], clara: [], remi: [] };
  events.forEach(e => {
    const d = new Date(e.end); d.setDate(d.getDate()-1);
    if (fmt(d) !== fmt(date)) return;
    // Trouve à quel prestataire appartient ce logement
    Object.entries(allData).forEach(([presta, evts]) => {
      if (evts.some(ev => ev.logement === e.logement)) {
        if (!prestaMap[presta]) prestaMap[presta] = [];
        prestaMap[presta].push(e.logement);
      }
    });
  });
  const seuils = { remi: 3, clara: 4, christelle: 4 };
  Object.entries(prestaMap).forEach(([presta, logs]) => {
    const seuil = seuils[presta] || 4;
    if (logs.length > seuil) overloaded.push(presta);
  });
  return overloaded;
}

function menageCard(label, events, cls, date, overload) {
  overload = overload || [];
  let items = '';
  if (events.length === 0) {
    items = `<div class="menage-empty">Aucun ménage</div>`;
  } else {
    items = events.map(e => {
      const c = colorMap[e.logement] || '#888';
      let presta = '';
      Object.entries(allData).forEach(([p, evts]) => {
        if (evts.some(ev => ev.logement === e.logement)) presta = p;
      });
      const isOverloaded = overload.includes(presta);
      return `<div class="menage-item" style="${isOverloaded ? 'border-bottom:2px solid '+c+';padding-bottom:2px' : ''}">
        <div class="menage-dot" style="background:${c}"></div>
        <div class="menage-nom" style="${isOverloaded ? 'font-weight:700;text-decoration:underline;color:'+c : ''}">${shortName(e.logement)}</div>
        ${(['Romantique chic patio','La Rotonde','Vue mer panoramique','Balneo 100m Plage Jardin'].includes(e.logement) && e.numPeople) ? '<div style="font-size:10px;color:'+c+';margin-left:auto;font-weight:600">'+e.numPeople+'p</div>' : ''}
        ${isOverloaded ? '<div style="font-size:9px;color:#FF5252;font-weight:700;margin-left:2px">!</div>' : ''}
      </div>`;
    }).join('');
  }
  // Alerte linge : check-ins avec >2 personnes pour certains apparts
  const LINGE_APPARTS = ['Romantique chic patio', 'La Rotonde', 'Vue mer panoramique', 'Balneo 100m Plage Jardin'];
  const allEvts = [...(allData.christelle||[]), ...(allData.clara||[]), ...(allData.remi||[])];
  const lingeAlertes = allEvts.filter(e => {
    const [y2,m2,d2] = e.start.split('-').map(Number); const d = new Date(y2, m2-1, d2);
    return fmt(d) === fmt(date) && LINGE_APPARTS.includes(e.logement) && e.numPeople > 2;
  });
  // Items calendrier annexe DRAP/CHECK IN-OUT pour ce jour
  const annexeItems = calAnnexe.filter(e => {
    const [y,m,d] = e.start.split('-').map(Number);
    const dStart = new Date(y, m-1, d);
    return fmt(dStart) === fmt(date);
  });
  const lingeHtml = lingeAlertes.length > 0 ? `
    <div style="margin-top:8px;padding:8px;background:rgba(255,193,7,0.1);border:1px solid #FFC107;border-radius:8px">
      <div style="font-size:10px;font-weight:600;color:#FFC107;margin-bottom:4px">🧺 Linge à déposer</div>
      ${lingeAlertes.map(e => `<div style="font-size:11px;color:#FFD54F">· ${shortName(e.logement)} (${e.numPeople}p)</div>`).join('')}
    </div>` : '';

  const annexeHtml = annexeItems.length > 0 ? `
    <div style="margin-top:8px;padding:8px;background:rgba(167,139,250,0.1);border:1px solid #7C3AED;border-radius:8px">
      <div style="font-size:10px;font-weight:600;color:#A78BFA;margin-bottom:4px">📋 Options & Infos</div>
      ${annexeItems.map(e => {
        const dStart = new Date(e.start);
        const label = (e.summary||'').replace(/✔️|⚠️|🕖|🕔|🕑|🕐|🕗|🕒|🕓|🕕/g,'').trim();
        const [yr,mo,dy] = e.start.split('-').map(Number);
        const dStartReal = new Date(yr, mo-1, dy);
        const isCheckin = fmt(dStartReal) === fmt(date);
        const tag = isCheckin ? '↓' : '↑';
        return `<div style="font-size:11px;color:#C4B5FD">${tag} ${label}</div>`;
      }).join('')}
    </div>` : '';

  const warningBorder = overload.length > 0 ? 'border-color:#FF5252' : '';
  return `
    <div class="menage-day" style="${warningBorder}">
      <div class="menage-day-title ${cls}">${label}</div>
      <div style="font-size:10px;color:var(--muted2);margin-bottom:8px">${events.length} ménage${events.length>1?'s':''}</div>
      ${items}
      ${lingeHtml}
      ${annexeHtml}
    </div>`;
}

function renderMenages(t, tom, af, today, tomorrow, after) {
  const now = new Date(); now.setHours(0,0,0,0);
  // Tous les checkouts à venir
  const allEvents = [...(allData.remi||[]), ...(allData.christelle||[]), ...(allData.clara||[]), ...(allData.compiegne||[])];
  // Jour de ménage = end - 1 jour
  const upcoming = allEvents
    .filter(e => { const d = new Date(e.end); d.setDate(d.getDate()-1); return d >= now; })
    .sort((a,b) => new Date(a.end) - new Date(b.end));

  // Grouper par date de ménage (end - 1)
  const byDate = {};
  upcoming.forEach(e => {
    const d = new Date(e.end); d.setDate(d.getDate()-1);
    const k = fmt(d);
    if (!byDate[k]) byDate[k] = [];
    byDate[k].push(e);
  });

  let html = '<div style="padding:20px">';
  Object.keys(byDate).sort().slice(0, 30).forEach(dateStr => {
    const d = new Date(dateStr);
    const isToday = dateStr === fmt(now);
    const isTomorrow = dateStr === fmt(new Date(now.getTime() + 86400000));
    const label = isToday ? "Aujourd'hui" : isTomorrow ? "Demain" :
      d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
    const color = isToday ? 'var(--accent)' : isTomorrow ? '#FF6B35' : 'var(--muted2)';

    html += `<div style="margin-bottom:20px">
      <div style="font-family:Syne,sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:${color};margin-bottom:8px">${label}</div>`;

    byDate[dateStr].forEach(e => {
      const c = colorMap[e.logement] || '#888';
      html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px">
        <div style="width:4px;height:36px;border-radius:2px;background:${c};flex-shrink:0"></div>
        <div>
          <div style="font-size:13px;font-weight:500;color:${c}">${e.logement}</div>
          <div style="font-size:11px;color:var(--muted2)">Départ · ${new Date(e.start).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} → ${d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
        </div>
      </div>`;
    });

    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderPlanning() {
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  let dayHeadersHtml = '';
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const isToday = date.getTime() === today.getTime();
    const isWeekend = date.getDay() === 0 || date.getDay() === 6;
    const dow = DOW_FR[date.getDay()];
    dayHeadersHtml += `<div class="day-header${isToday?' is-today':''}${isWeekend?' is-weekend':''}">
      <span class="dow">${dow}</span>
      <span class="dnum">${d}</span>
    </div>`;
  }

  let rowsHtml = '';

  // Affiche par groupe
  Object.entries(allData).forEach(([presta, events]) => {
    const groupe = GROUPES[presta];
    const logements = [...new Set(events.map(e => e.logement))];

    // En-tête groupe
    rowsHtml += `<div class="group-header">
      <div class="group-label" style="color:${groupe.color}">${groupe.label}</div>
      <div class="group-spacer"></div>
    </div>`;

    logements.forEach(logement => {
      const color = colorMap[logement] || '#888';
      const evs = events.filter(e => e.logement === logement);

      let cellsHtml = '';
      for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(viewYear, viewMonth, d);
        const isToday = date.getTime() === today.getTime();
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        cellsHtml += `<div class="day-cell${isToday?' is-today':''}${isWeekend?' is-weekend':''}"></div>`;
      }

      let barsHtml = '';
      const mStart = new Date(viewYear, viewMonth, 1);
      const mEnd   = new Date(viewYear, viewMonth, daysInMonth + 1);

      evs.forEach(ev => {
        const evStart = new Date(ev.start);
        const evEnd   = new Date(ev.end);
        if (evEnd <= mStart || evStart >= mEnd) return;

        const clampStart = evStart < mStart ? mStart : evStart;
        const clampEnd   = evEnd   > mEnd   ? mEnd   : evEnd;
        const startDay   = clampStart.getDate();
        const duration   = Math.round((clampEnd - clampStart) / 86400000);
        if (duration <= 0) return;

        const fname = (ev.summary || '').split(' ')[0];
        const textColor = darkOrLight(color);
        const startsHere = evStart >= mStart;
        const endsHere   = evEnd <= mEnd;

        const HALF_CI = 3;
        const HALF_CO = 34;
        const adjLeft  = startsHere ? (evStart.getDate() - 1) * 38 + HALF_CI : (startDay - 1) * 38;
        const adjRight = endsHere   ? (new Date(ev.end).getDate() - 1) * 38 + HALF_CO : (startDay - 1) * 38 + duration * 38;
        const adjWidth = adjRight - adjLeft;

        if (adjWidth > 0) {
          const nl = !startsHere ? 'nl' : '';
          const nr = !endsHere   ? 'nr' : '';
          const cls = [nl, nr].filter(Boolean).join(' ');
          const nbPers = ev.numPeople ? ' · ' + ev.numPeople + 'p' : '';
          const label = adjWidth > 40 ? (fname + nbPers) : '';
          barsHtml += `<div class="res-bar ${cls}" style="left:${adjLeft}px;width:${adjWidth}px;background:${color};color:${textColor}" title="${ev.summary||''}">${label}</div>`;
        }
      });

      // Traits diagonaux séparateurs
      const coDays = new Set(evs.filter(e => {
        const d = new Date(e.end);
        return d.getMonth() === viewMonth && d.getFullYear() === viewYear;
      }).map(e => new Date(e.end).getDate()));
      const ciDays = new Set(evs.filter(e => {
        const d = new Date(e.start);
        return d.getMonth() === viewMonth && d.getFullYear() === viewYear;
      }).map(e => new Date(e.start).getDate()));
      let sepsHtml = '';
      coDays.forEach(d => {
        if (ciDays.has(d)) {
          const x = (d - 1) * 38;
          sepsHtml += `<svg style="position:absolute;top:5px;left:${x}px;width:38px;height:34px;z-index:10;overflow:visible;pointer-events:none" viewBox="0 0 38 34">
            <line x1="26" y1="0" x2="12" y2="34" stroke="#0A0A0A" stroke-width="2.5" stroke-linecap="round"/>
          </svg>`;
        }
      });

      rowsHtml += `<div class="row">
        <div class="row-name">
          <div class="color-dot" style="background:${color}"></div>
          <div class="row-name-text" title="${logement}">${shortName(logement)}</div>
        </div>
        <div class="row-cells" style="position:relative">
          ${cellsHtml}
          ${barsHtml}
          ${sepsHtml}
        </div>
      </div>`;
    });
  });

  return `<div class="planning-outer"><div class="planning-inner">
    <div class="grid-header">
      <div class="col-name">Logement</div>
      <div class="day-headers">${dayHeadersHtml}</div>
    </div>
    ${rowsHtml}
  </div></div>`;
}

function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function shortName(n) {
  const noms = {
    'Hamac vue mer':            'Hamac',
    'Kitesurf':                 'Kitesurf',
    'Paddle':                   'Paddle',
    'Surf':                     'Surf',
    '3 Chambres':               '3 Chambres',
    'Hamac chic vue mer':       'Hamac chic',
    'Rez de chaussee Parking':  'Rez de chaussée',
    'SPA Brasero':              'SPA',
    'Vue mer panoramique':      'Vue panoramique',
    'Balneo 100m Plage Jardin': 'Balneo jardin',
    'Suite Romantique':         'Suite romantique',
    '150m plage Coeur de Berck':'150m Coeur Berck',
    'Balneo Face mer':          'Balneo face mer',
    'Hamac Face Mer':           'Hamac face mer',
    'La Rotonde':               'La Rotonde',
    'Coeur des sables':         'Coeur des sables',
    'Romantique chic patio':    'Romantique chic',
    'Romantique Face Mer':      'Romantique face mer',
    'Face Mer Esplanade':       'Esplanade',
    'Terrasse 100m plage':      'Terrasse'
  };
  return noms[n] || n.replace(/❤️|☀️|❤|☆|♡/g,'').trim();
}

function darkOrLight(hex) {
  if (!hex || hex.length < 7) return '#fff';
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 128 ? '#000' : '#fff';
}

function setTab(tab) { activeTab = tab; renderApp(); }

function prevMonth() {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  document.getElementById('nav-label').textContent = MOIS_FR[viewMonth] + ' ' + viewYear;
  document.getElementById('app').querySelector('.planning-outer').outerHTML = renderPlanning();
  renderApp();
}

function nextMonth() {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderApp();
}

function showError(msg) {
  document.getElementById('app').innerHTML = `<div style="padding:60px 20px;text-align:center">
    <div style="font-size:28px;margin-bottom:12px">⚠️</div>
    <div style="font-size:14px;color:#666;line-height:1.6">${msg}</div>
  </div>`;
}

init();
</script>
